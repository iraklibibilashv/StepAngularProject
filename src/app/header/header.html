<header class="ev-header">
  <!-- Top Bar -->
  <div class="ev-topbar">
    <a class="ev-logo" routerLink="/">
      <div class="ev-logo-box"><span class="ev-logo-letters">ST</span></div>
      <span class="ev-logo-name">Step Tech</span>
    </a>
    <nav class="ev-nav">
      <div class="ev-nav-item">
        <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
          >Home</a
        >
      </div>

      <div class="ev-nav-item">
        <a routerLink="/products" routerLinkActive="active">Products</a>
      </div>
      <div class="ev-nav-item">
        <a routerLink="/contact" routerLinkActive="active">Contact</a>
      </div>
    </nav>



      
    <div class="ev-actions">
      @if (isLoggedIn) {
      <button class="ev-act-btn" routerLink="/wishlist" title="Wishlist">
        <svg
          width="17"
          height="17"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <path
            d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"
          />
        </svg>
        <span class="ev-badge">{{ wishlistCount }}</span>
      </button>

      <button class="ev-act-btn" routerLink="/cart" title="Cart">
        <svg
          width="17"
          height="17"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <circle cx="9" cy="21" r="1" />
          <circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6" />
        </svg>
        <span class="ev-badge">{{ cartCount }}</span>
      </button>
    }
     @if (isLoggedIn) {
      <button class="ev-act-btn" routerLink="/myaccount" title="Account">
        <svg
          width="17"
          height="17"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </button>
      } @else {
          <button class="ev-act-btn" routerLink="/login" title="Login">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
  </button>
      }

      <button class="ev-act-btn ev-burger" (click)="menuOpen = !menuOpen" title="Menu">
        <svg
          width="17"
          height="17"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="ev-mobile-menu" [class.open]="menuOpen">
    <a
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="menuOpen = false"
      >Home</a
    >
    <a routerLink="/products" routerLinkActive="active" (click)="menuOpen = false">Products</a>
    <a routerLink="/contact" routerLinkActive="active" (click)="menuOpen = false">Contact</a>
  </div>
</header>
