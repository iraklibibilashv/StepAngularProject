<div class="fp-page">
  <div class="fp-bg">
    <div class="fp-grid"></div>
    <div class="fp-glow"></div>
  </div>

  <div class="fp-card">
    <div class="fp-icon">
      <svg
        width="36"
        height="36"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
        <path d="M7 11V7a5 5 0 0110 0v4" />
      </svg>
    </div>

    <h1 class="fp-title">Forgot Password</h1>
    <p class="fp-sub">Enter your email and we'll send you a reset code</p>

    <div class="fp-form">
      <div class="fp-field">
        <label>Email Address</label>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="your@email.com"
          [class.has-value]="email"
        />
      </div>

      @if (errorMsg) {
        <div class="fp-error">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          {{ errorMsg }}
        </div>
      }

      @if (successMsg) {
        <div class="fp-success">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
          </svg>
          {{ successMsg }}
        </div>
      }

      <button class="fp-btn" (click)="onSubmit()" [disabled]="loading">
        @if (loading) {
          <span class="fp-spinner"></span>
          Sending...
        } @else {
          Send Reset Code
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        }
      </button>
    </div>

    <div class="fp-footer">
      Remembered your password?
      <a routerLink="/login">Sign in</a>
    </div>
  </div>
</div>
