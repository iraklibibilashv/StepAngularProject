@if (loading) {
    <div class="loading">
    <div class="loading-spinner"></div>
    <span class="loading-text">Loading products...</span>
  </div>
} @else {
  

<div class="products-grid">
    @for (item of filterCategory; track item.id) {
  <div class="card">

  <div class="card-img">
    <img [src]="item.imageUrl" alt="" />
    <div class="card-actions">
      <button class="card-action-btn" title="Wishlist">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
        </svg>
      </button>
      <button class="card-action-btn view" title="Quick view">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="card-body">
    <div class="card-meta">
      <span class="card-cat">{{item.category.name}}</span>
      <span class="card-dot">•</span>
      <span class="card-brand">{{item.brand}}</span>
    </div>
    <p class="card-name">{{item.name}}</p>
    <div class="card-rating">
      <span class="card-cat">In Stock {{item.stock}}</span>
    </div>
    <div class="card-price"><span>₾</span>{{item.price}}</div>
    <button class="card-add">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/>
      </svg>
      Add to Cart
    </button>
  </div>
  </div>
}

</div>
}
