<div class="rp-page">
  <div class="rp-bg">
    <div class="rp-grid"></div>
    <div class="rp-glow"></div>
  </div>

  <div class="rp-card">
    <div class="rp-icon">
      <svg
        width="36"
        height="36"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
      </svg>
    </div>

    <h1 class="rp-title">Reset Password</h1>
    <p class="rp-sub">Enter the token from your email and set a new password</p>

    <div class="rp-form">
      <div class="rp-field">
        <label>Reset Token</label>
        <input
          type="text"
          [(ngModel)]="data.token"
          placeholder="Paste token from email"
          [class.has-value]="data.token"
        />
      </div>

      <div class="rp-field">
        <label>New Password</label>
        <input
          type="password"
          [(ngModel)]="data.password"
          placeholder="••••••••"
          [class.has-value]="data.password"
        />
      </div>

      <div class="rp-field">
        <label>Confirm Password</label>
        <input
          type="password"
          [(ngModel)]="data.confirmPassword"
          placeholder="••••••••"
          [class.has-value]="data.confirmPassword"
        />
      </div>

      @if (errorMsg) {
        <div class="rp-error">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          {{ errorMsg }}
        </div>
      }

      @if (successMsg) {
        <div class="rp-success">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
          </svg>
          {{ successMsg }}
        </div>
      }

      <button class="rp-btn" (click)="onReset()" [disabled]="loading">
        @if (loading) {
          <span class="rp-spinner"></span>
          Resetting...
        } @else {
          Reset Password
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        }
      </button>
    </div>

    <div class="rp-footer">Back to <a routerLink="/login">Sign in</a></div>
  </div>
</div>
